<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./script.js" defer></script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <title>Generator TRF PDF</title>
  </head>
  <body>
    <div class="container">
      <h1>Генератор TRF</h1>
      <form id="pdfForm" class="pdfForm">
        <div>
          <input type="text" id="name" name="name" placeholder="TRF" required />
        </div>

        <div>
          <div class="select-wrapper">
            <label for="country">Choose a warehouse</label>
            <select name="country" id="country">
              <option value="PolandM10">Poland M10</option>
              <option value="CzechRepublicС27">Czech Republic С27</option>
              <option value="Germany">Germany</option>
            </select>
          </div>
        </div>

        <button type="submit">Згенерувати TRF</button>
      </form>
    </div>
  </body>
</html>
