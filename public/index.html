<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./script.js" defer></script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <title>Generator TRF PDF</title>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Generate Transport Label</h1>
      <form id="pdf-form" class="pdfForm">
        <!-- <div>
          <input type="text" id="name" name="name" placeholder="TRF" required />
        </div> -->
        <div class="trf-group">
          <span class="title-trf">TRF Numbers:</span>

          <div id="trf-container">
            <div class="trf-item">
              <input type="text" name="trf" placeholder="Enter TRF number" />
              <!-- <button type="button" class="remove-btn">✕</button> -->
            </div>
          </div>

          <button class="btn-add" type="button" id="add-trf">+ Add TRF</button>
        </div>

        <div>
          <div class="select-wrapper">
            <label for="country">Choose a warehouse</label>
            <select name="country" id="country">
              <option value="PL(M10)">PL(M10)</option>
              <option value="(A)">Berlin (A)</option>
              <option value="(С27)">Czehy (С27)</option>
              <option value="PLF(M40)">PLF(M40)</option>
              <option value="PLR(M40)">PLR(M40)</option>
              <option value="PLD(M26)">PLD(M26)</option>
              <option value="BE(15)">BE(15)</option>
              <option value="UKA">UKA</option>
              <option value="PLC(M3)">PLC(M3)</option>
            </select>
          </div>
        </div>

        <div class="checkbox-cards">
          <label class="card">
            <input type="checkbox" checked name="card" value="orders" />
            <span>ORDERS</span>
          </label>
          <label class="card">
            <input type="checkbox" name="card" value="atd" />
            <span>ATD</span>
          </label>
          <label class="card">
            <input type="checkbox" name="card" value="b2b" />
            <span>B2B</span>
          </label>
          <label class="card">
            <input type="checkbox" name="card" value="b2b single" />
            <span>B2B SINGLE</span>
          </label>
          <label class="card">
            <input type="checkbox" name="card" value="single" />
            <span>SINGLE</span>
          </label>
        </div>

        <button id="generate-btn" class="btn" type="submit">
          Generate Transport Label
        </button>
      </form>
      <div class="blockArticul">
        <h4>Article List</h4>
        <div class="articul">
          <input id="inputArticul" type="text" placeholder="Enter articul id" />
          <button id="btnArticul">generate</button>
        </div>
      </div>
    </div>
  </body>
</html>
