<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./script.js" defer></script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <title>Generator TRF PDF</title>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Generate Transport Label</h1>
      <form id="pdf-form" class="pdfForm">
        <!-- <div>
          <input type="text" id="name" name="name" placeholder="TRF" required />
        </div> -->
        <div class="trf-group">
          <span class="title-trf">TRF Numbers:</span>

          <div id="trf-container">
            <div class="trf-item">
              <input type="text" name="trf[]" placeholder="Enter TRF number" />
              <!-- <button type="button" class="remove-btn">✕</button> -->
            </div>
          </div>

          <button class="btn-add" type="button" id="add-trf">+ Add TRF</button>
        </div>

        <div>
          <div class="select-wrapper">
            <label for="country">Choose a warehouse</label>
            <select name="country" id="country">
              <option value="PolandM10">Poland M10</option>
              <option value="CzechRepublicС27">Czech Republic С27</option>
              <option value="Germany">Germany</option>
            </select>
          </div>
        </div>

        <div class="checkbox-cards">
          <label class="card">
            <input type="checkbox" checked name="card" value="orders" />
            <span>ORDERS</span>
          </label>
          <label class="card">
            <input type="checkbox" name="card" value="adt" />
            <span>ATD</span>
          </label>
          <label class="card">
            <input type="checkbox" name="card" value="btb" />
            <span>BTB</span>
          </label>
          <label class="card">
            <input type="checkbox" name="card" value="single" />
            <span>SINGLE</span>
          </label>
        </div>

        <button id="generate-btn" class="btn" type="submit">
          Generate Transport Label
        </button>
      </form>
    </div>
  </body>
</html>
